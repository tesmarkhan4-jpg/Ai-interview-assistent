<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithHUD | Join the Fleet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --bg: #fafafa;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: rgba(99, 102, 241, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
        }

        /* BACKGROUND */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #fff; overflow: hidden;
        }
        .blob {
            position: absolute; width: 600px; height: 600px;
            filter: blur(100px); opacity: 0.3;
            animation: float 25s infinite alternate ease-in-out;
        }
        .blob-1 { background: radial-gradient(circle, var(--primary) 0%, transparent 70%); top: -200px; left: -200px; }
        .blob-2 { background: radial-gradient(circle, #0ea5e9 0%, transparent 70%); bottom: -200px; right: -200px; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, 50px) scale(1.1); } }

        .signup-card {
            width: 100%; max-width: 480px; padding: 64px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(40px);
            border-radius: 48px; border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.05);
            animation: cardEnter 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        @keyframes cardEnter { from { opacity: 0; transform: translateY(40px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .brand-header { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; justify-content: center; }
        .brand-header span { font-weight: 900; font-size: 1.6rem; letter-spacing: -1px; }

        h2 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 12px; text-align: center; }
        p.subtitle { color: var(--text-muted); text-align: center; margin-bottom: 40px; font-weight: 500; }

        .input-group { margin-bottom: 24px; }
        .input-label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; padding-left: 4px; }
        .input-field {
            width: 100%; padding: 18px 24px; border-radius: 20px;
            border: 2px solid #f1f5f9; background: #f8fafc;
            font-size: 1rem; font-weight: 600; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 5px var(--primary-glow); }

        .btn-register {
            width: 100%; padding: 20px; border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white; border: none; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 16px; box-shadow: 0 15px 35px var(--primary-glow);
        }
        .btn-register:hover { transform: translateY(-3px); box-shadow: 0 20px 45px var(--primary-glow); }

        .footer-link { text-align: center; margin-top: 32px; font-size: 0.95rem; font-weight: 500; color: var(--text-muted); }
        .footer-link a { color: var(--primary); font-weight: 800; text-decoration: none; }
    </style>
</head>
<body>
    <div class="aurora-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="signup-card">
        <div class="brand-header">
            <img src="/icon.png" alt="Z" style="height: 36px; width: 36px; border-radius: 10px;">
            <span>Zenith<span style="color:var(--primary);">HUD</span></span>
        </div>

        <h2>Join the Elite</h2>
        <p class="subtitle">Initialize your career acceleration protocols.</p>

        <form id="signup-form">
            <div class="input-group">
                <label class="input-label">Identity Name</label>
                <input type="text" id="full_name" class="input-field" placeholder="Full name..." required>
            </div>
            <div class="input-group">
                <label class="input-label">Relay Email</label>
                <input type="email" id="email" class="input-field" placeholder="name@company.com" required>
            </div>
            <div class="input-group">
                <label class="input-label">Secure Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-register" id="reg-btn">Create Tactical Account</button>
        </form>

        <p class="footer-link">Already a member? <a href="/login">Sign In</a></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan') || 'trial';
        
        const loginLink = document.querySelector('.footer-link a');
        if(loginLink && plan) loginLink.href = `/login?plan=${plan}`;

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            const full_name = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.innerText = "Synchronizing...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name, plan })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    const loginRes = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, hwid: 'WEB_SIGNUP_PREMIUM' })
                    });
                    const loginData = await loginRes.json();
                    if (loginData.status === 'success') {
                        localStorage.setItem('zenith_user', JSON.stringify(loginData.user));
                        window.location.href = `/checkout?plan=${plan}`;
                    }
                } else {
                    alert(data.detail || "Registration failed.");
                    btn.innerText = "Create Tactical Account";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Connection failed.");
                btn.innerText = "Create Tactical Account";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
