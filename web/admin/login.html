<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Admin | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --text: #111827;
            --text-muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Left Side - Unique Liquid Animation section */
        .visual-side {
            flex: 1.2;
            background: #0f172a; /* Deep elegant base */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* The Soft Floating Blobs */
        .blob-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            filter: blur(80px);
            z-index: 1;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 {
            width: 400px; height: 400px;
            background: #4f46e5;
            top: -100px; left: -100px;
            animation-duration: 18s;
        }

        .blob-2 {
            width: 500px; height: 500px;
            background: #9333ea;
            bottom: -150px; right: -100px;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 350px; height: 350px;
            background: #2563eb;
            top: 40%; left: 30%;
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, 50px) scale(1.1); }
            66% { transform: translate(-50px, 100px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .brand-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: logoEnter 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes logoEnter {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand-logo {
            height: 130px;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.25));
            margin-bottom: 32px;
        }

        .brand-name {
            font-size: 38px;
            font-weight: 900;
            color: white;
            letter-spacing: -1.8px;
            margin-bottom: 12px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        .brand-tag {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Right Side - Form section */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: white;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .header {
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            color: #000;
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 18px;
            color: #000;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.08);
        }

        .btn-primary {
            width: 100%;
            background: #000;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 20px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 12px;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            background: #1e293b;
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2);
        }

        .error-message {
            background: #fff1f2;
            border: 1px solid #fee2e2;
            color: #e11d48;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        #otp-section {
            display: none;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .back-btn {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 700;
        }

        .back-btn:hover { color: #000; }

        @media (max-width: 1100px) {
            .visual-side { display: none; }
            .form-side { padding: 40px; }
        }
    </style>
</head>
<body>
    <div class="visual-side">
        <div class="blob-container">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>
        <div class="brand-content">
            <img src="/logo.png" alt="Zenith Logo" class="brand-logo">
            <h2 class="brand-name">Zenith Admin</h2>
            <p class="brand-tag">Excellence in Management</p>
        </div>
    </div>

    <div class="form-side">
        <div class="login-container">
            <div id="login-section">
                <div class="header">
                    <h1>Sign In</h1>
                    <p>Enter your details to access the dashboard.</p>
                </div>

                <div class="error-message" id="login-error"></div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" autocomplete="off" placeholder="name@company.com">
                </div>

                <div class="form-group" style="margin-bottom: 32px;">
                    <label>Password</label>
                    <input type="password" id="password" autocomplete="new-password" placeholder="Enter your password">
                </div>

                <button class="btn-primary" id="login-btn" onclick="handleLogin()">
                    <span id="login-text">Sign In</span>
                    <div class="loader" id="login-loader"></div>
                </button>
            </div>

            <div id="otp-section">
                <div class="header">
                    <h1>Verify Email</h1>
                    <p>Please enter the code we sent to your email.</p>
                </div>

                <div class="error-message" id="otp-error"></div>

                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text" maxlength="6" id="otp-input" autocomplete="off" style="text-align: center; font-size: 32px; letter-spacing: 12px; font-weight: 900; border-radius: 20px; border-width: 2px;" placeholder="000000">
                </div>

                <button class="btn-primary" id="verify-btn" onclick="handleVerify()">
                    <span id="verify-text">Verify and Enter</span>
                    <div class="loader" id="verify-loader"></div>
                </button>
                <div class="back-btn" onclick="location.reload()">Back to login</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            const text = document.getElementById('login-text');
            const loader = document.getElementById('login-loader');

            if (!email || !password) return;

            errorBox.style.display = 'none';
            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/admin/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                } else {
                    errorBox.innerText = data.detail || 'Incorrect credentials.';
                    errorBox.style.display = 'block';
                }
            } catch (e) {
                errorBox.innerText = 'Connection error.';
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                text.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        async function handleVerify() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp-input').value;
            const errorBox = document.getElementById('otp-error');
            const btn = document.getElementById('verify-btn');
            const text = document.getElementById('verify-text');
            const loader = document.getElementById('verify-loader');

            if (otp.length !== 6) return;

            errorBox.style.display = 'none';
            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/admin/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    localStorage.setItem('admin_token', data.token);
                    window.location.href = '/admin';
                } else {
                    errorBox.innerText = data.detail || 'Incorrect code.';
                    errorBox.style.display = 'block';
                }
            } catch (e) {
                errorBox.innerText = 'Verification failed.';
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                text.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
