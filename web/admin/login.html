<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Admin | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --text: #111827;
            --text-muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Left Side - Visual section */
        .visual-side {
            flex: 1.2;
            background: linear-gradient(135deg, #4f46e5 0%, #a855f7 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .visual-side::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.1) 0%, transparent 40%);
        }

        .brand-box {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
        }

        .brand-name {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 12px;
        }

        .brand-tag {
            font-size: 18px;
            font-weight: 500;
            opacity: 0.8;
        }

        /* Right Side - Form section */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: white;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .header {
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        #otp-section {
            display: none;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .back-btn {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
        }

        .back-btn:hover { color: var(--text); }

        @media (max-width: 900px) {
            .visual-side { display: none; }
            .form-side { padding: 40px; }
        }
    </style>
</head>
<body>
    <div class="visual-side">
        <div class="brand-box">
            <h2 class="brand-name">Zenith Admin</h2>
            <p class="brand-tag">Professional Management Suite</p>
        </div>
    </div>

    <div class="form-side">
        <div class="login-container">
            <div id="login-section">
                <div class="header">
                    <h1>Sign In</h1>
                    <p>Enter your details to access the dashboard.</p>
                </div>

                <div class="error-message" id="login-error"></div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" autocomplete="off" placeholder="name@company.com">
                </div>

                <div class="form-group" style="margin-bottom: 32px;">
                    <label>Password</label>
                    <input type="password" id="password" autocomplete="new-password" placeholder="Enter your password">
                </div>

                <button class="btn-primary" id="login-btn" onclick="handleLogin()">
                    <span id="login-text">Sign In</span>
                    <div class="loader" id="login-loader"></div>
                </button>
            </div>

            <div id="otp-section">
                <div class="header">
                    <h1>Verify Email</h1>
                    <p>Please enter the code we sent to your email.</p>
                </div>

                <div class="error-message" id="otp-error"></div>

                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text" maxlength="6" id="otp-input" autocomplete="off" style="text-align: center; font-size: 32px; letter-spacing: 12px; font-weight: 800;" placeholder="000000">
                </div>

                <button class="btn-primary" id="verify-btn" onclick="handleVerify()">
                    <span id="verify-text">Verify and Enter</span>
                    <div class="loader" id="verify-loader"></div>
                </button>
                <div class="back-btn" onclick="location.reload()">Back to login</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            const text = document.getElementById('login-text');
            const loader = document.getElementById('login-loader');

            if (!email || !password) return;

            errorBox.style.display = 'none';
            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/admin/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                } else {
                    errorBox.innerText = data.detail || 'Email or password incorrect.';
                    errorBox.style.display = 'block';
                }
            } catch (e) {
                errorBox.innerText = 'Connection error. Please try again.';
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                text.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        async function handleVerify() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp-input').value;
            const errorBox = document.getElementById('otp-error');
            const btn = document.getElementById('verify-btn');
            const text = document.getElementById('verify-text');
            const loader = document.getElementById('verify-loader');

            if (otp.length !== 6) return;

            errorBox.style.display = 'none';
            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/admin/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    localStorage.setItem('admin_token', data.token);
                    window.location.href = '/admin';
                } else {
                    errorBox.innerText = data.detail || 'Incorrect verification code.';
                    errorBox.style.display = 'block';
                }
            } catch (e) {
                errorBox.innerText = 'Verification failed. Please try again.';
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                text.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
