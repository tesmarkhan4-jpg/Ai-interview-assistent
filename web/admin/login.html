<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Admin | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --text: #111827;
            --text-muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Left Side - Luxury Visual section */
        .visual-side {
            flex: 1.2;
            background: linear-gradient(-45deg, #4f46e5, #7c3aed, #2563eb, #9333ea);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient glows for extra premium feel */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.15);
            filter: blur(80px);
            border-radius: 50%;
            pointer-events: none;
        }

        .visual-side::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.1) 100%);
        }

        .brand-content {
            position: relative;
            z-index: 5;
            text-align: center;
            animation: logoFadeIn 1.2s ease-out;
        }

        @keyframes logoFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .brand-logo {
            height: 120px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
            margin-bottom: 30px;
        }

        .brand-name {
            font-size: 36px;
            font-weight: 900;
            color: white;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
        }

        .brand-tag {
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Right Side - Form section */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: white;
            position: relative;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .header {
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 16px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 12px;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        }

        .error-message {
            background: #fff1f2;
            border: 1px solid #fee2e2;
            color: #e11d48;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        #otp-section {
            display: none;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .back-btn {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-btn:hover { color: var(--text); }

        @media (max-width: 1024px) {
            .visual-side { display: none; }
            .form-side { padding: 40px; }
        }
    </style>
</head>
<body>
    <div class="visual-side">
        <div class="glow" style="top: -50px; left: -50px;"></div>
        <div class="glow" style="bottom: -50px; right: -50px;"></div>
        <div class="brand-content">
            <img src="/logo.png" alt="Zenith Logo" class="brand-logo">
            <h2 class="brand-name">Zenith Admin</h2>
            <p class="brand-tag">Premium Management</p>
        </div>
    </div>

    <div class="form-side">
        <div class="login-container">
            <div id="login-section">
                <div class="header">
                    <h1>Sign In</h1>
                    <p>Enter your details to access the dashboard.</p>
                </div>

                <div class="error-message" id="login-error"></div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" autocomplete="off" placeholder="name@company.com">
                </div>

                <div class="form-group" style="margin-bottom: 32px;">
                    <label>Password</label>
                    <input type="password" id="password" autocomplete="new-password" placeholder="Enter your password">
                </div>

                <button class="btn-primary" id="login-btn" onclick="handleLogin()">
                    <span id="login-text">Sign In</span>
                    <div class="loader" id="login-loader"></div>
                </button>
            </div>

            <div id="otp-section">
                <div class="header">
                    <h1>Verify Email</h1>
                    <p>Please enter the code we sent to your email.</p>
                </div>

                <div class="error-message" id="otp-error"></div>

                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text" maxlength="6" id="otp-input" autocomplete="off" style="text-align: center; font-size: 32px; letter-spacing: 12px; font-weight: 900; border-radius: 16px;" placeholder="000000">
                </div>

                <button class="btn-primary" id="verify-btn" onclick="handleVerify()">
                    <span id="verify-text">Verify and Enter</span>
                    <div class="loader" id="verify-loader"></div>
                </button>
                <div class="back-btn" onclick="location.reload()">Back to login</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            const text = document.getElementById('login-text');
            const loader = document.getElementById('login-loader');

            if (!email || !password) return;

            errorBox.style.display = 'none';
            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/admin/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                } else {
                    errorBox.innerText = data.detail || 'Incorrect credentials.';
                    errorBox.style.display = 'block';
                }
            } catch (e) {
                errorBox.innerText = 'Connection failure.';
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                text.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        async function handleVerify() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp-input').value;
            const errorBox = document.getElementById('otp-error');
            const btn = document.getElementById('verify-btn');
            const text = document.getElementById('verify-text');
            const loader = document.getElementById('verify-loader');

            if (otp.length !== 6) return;

            errorBox.style.display = 'none';
            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/admin/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    localStorage.setItem('admin_token', data.token);
                    window.location.href = '/admin';
                } else {
                    errorBox.innerText = data.detail || 'Incorrect code.';
                    errorBox.style.display = 'block';
                }
            } catch (e) {
                errorBox.innerText = 'Verification failed.';
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                text.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
